spring:
  application.name: admin-app
  config.import: classpath:application-common.yml
  # 스케줄러 스레드 풀 2 — daily RetentionPurgeJob 의 긴 배치 실행이 per-minute
  # KeyExpirationJob tick 을 단일 스레드에서 지연시키지 않도록(4개 @Scheduled job 공유).
  task:
    scheduling:
      pool:
        size: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: APP_OWNER
    default-schema: APP_OWNER
    # APP_OWNER schema already contains the CTX_PKG package and APP_CTX
    # context created by scripts/bootstrap-vpd.sql before Flyway ever
    # runs. baseline-on-migrate lets Flyway record V0 in its history
    # table on first run instead of refusing to start because the
    # schema is "non-empty". V1+ migrations apply normally afterwards.
    baseline-on-migrate: true
    baseline-version: 0

  session:
    store-type: redis
    timeout: PT30M
    redis:
      namespace: spring:session
  security:
    user:
      # We do not use Spring Security's default in-memory user — set a
      # random impossible-to-guess password to suppress the "Using
      # generated security password" startup log line.
      password: "____disabled____never-used-loaded-from-db-instead____"

server.port: 8081

management:
  metrics:
    tags:
      application: admin-app

passkey:
  mds:
    fixed-delay: PT6H
    initial-delay: PT30S
  key-rotation:
    grace: PT30M
    expiration-job:
      fixed-delay: PT1M
      initial-delay: PT45S
  admin:
    lockout:
      max-attempts: 5      # 연속 실패 N회 시 계정 잠금
      duration: PT15M      # 잠금 지속 시간(ISO-8601); 경과 후 자동 해제
  api-key:
    rotation:
      grace: PT24H         # rotate 시 구 키 유예 만료(ISO-8601); 이 기간 구·신 키 병존 후 구 키 자동 만료
  alert:
    mail:
      enabled: false        # true 면 MailAlertChannel 등록, ops 메일 발송
      to:                   # 알림 수신 운영자 주소
      min-severity: HIGH    # 이 severity 이상만 메일(LOW/MEDIUM/HIGH/CRITICAL). 기본 LogAlertChannel 은 전 severity 로깅
  retention:
    fixed-delay: P1D            # 하루 1회 실행
    initial-delay: PT5M         # 부팅 후 5분
    invitation: P90D            # 만료/수락 후 90일
    password-reset-token: P30D  # 만료/소비 후 30일
    recovery-code: P180D        # 사용 후 180일
    webauthn-snapshot: P365D    # 스냅샷 1년
    mds-sync-history: P90D      # sync 이력 90일
    ceremony-event: P90D        # funnel 지표 90일 (funnel 조회는 최대 30일)
