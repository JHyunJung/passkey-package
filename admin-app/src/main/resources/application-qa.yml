# qa profile — 내부 QA / 통합 테스트 환경
#
# 활성화: SPRING_PROFILES_ACTIVE=qa
#
# 모든 시크릿과 환경 특화 값은 환경변수로 주입. 빈 default (${VAR:}) 는
# 운영자가 반드시 값을 설정해야 함을 표시 (미설정 시 부팅 실패).

spring:
  datasource:
    url:               ${SPRING_DATASOURCE_URL:}
    driver-class-name: oracle.jdbc.OracleDriver
    username:          ${SPRING_DATASOURCE_USERNAME:}
    password:          ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    # Finding #3 (Approach A): Flyway 는 스키마 OWNER(APP_OWNER)로 실행 — 런타임
    # datasource 유저(APP_ADMIN_USER)에서 DDL 권한을 전부 제거하기 위함.
    # 빈 폴백이라 qa 에서 env 미주입 시 Flyway 연결이 즉시 실패(fail-fast),
    # datasource password 패턴과 동일.
    user:     ${SPRING_FLYWAY_USER:}
    password: ${SPRING_FLYWAY_PASSWORD:}
    # qa 도 baseline-on-migrate 는 base 의 true 그대로 — 일부 qa 환경에서
    # 새 schema 로 시작 가능해야 함.
    # qa 는 운영자 계정(seed-common)만. 테넌트 시드는 db/qa(placeholder).
    locations: classpath:db/migration,classpath:db/seed-common,classpath:db/qa

server:
  port: ${SERVER_PORT:8081}
  # TLS 종단을 앱에서 직접 처리할 경우 환경변수로 주입(미설정 시 SSL 비활성 — 보통 앞단 LB/리버스프록시가 종단).
  ssl:
    enabled:            ${SERVER_SSL_ENABLED:false}
    key-store:          ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type:     ${SERVER_SSL_KEY_STORE_TYPE:}
    key-alias:          ${SERVER_SSL_KEY_ALIAS:}

passkey:
  key-envelope:
    # qa 는 dev 의 zero-bytes 와 달리 실제 키 주입 필수.
    master-key: ${PASSKEY_KEY_ENVELOPE_MASTER_KEY:}

logging:
  level:
    com.crosscert.passkey: INFO
