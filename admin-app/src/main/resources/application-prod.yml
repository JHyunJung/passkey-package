# prod profile — 프로덕션 환경 (SaaS 또는 on-prem)
#
# 활성화: SPRING_PROFILES_ACTIVE=prod
#         deployment.mode 와는 독립 — onprem 배포라면
#         + PASSKEY_DEPLOYMENT_MODE=onprem 추가
#
# 모든 시크릿과 환경 특화 값은 환경변수로 주입.

spring:
  datasource:
    url:               ${SPRING_DATASOURCE_URL:}
    driver-class-name: oracle.jdbc.OracleDriver
    username:          ${SPRING_DATASOURCE_USERNAME:}
    password:          ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    # Finding #3 (Approach A): Flyway 는 스키마 OWNER(APP_OWNER)로 실행 — 런타임
    # datasource 유저(APP_ADMIN_USER)에서 DDL 권한을 전부 제거하기 위함.
    # 빈 폴백이라 prod 에서 env 미주입 시 Flyway 연결이 즉시 실패(fail-fast),
    # datasource password 패턴과 동일.
    user:     ${SPRING_FLYWAY_USER:}
    password: ${SPRING_FLYWAY_PASSWORD:}
    # prod 는 seed-common 미포함 — 운영자·테넌트 데모 시드 없음(db/prod placeholder 뿐).
    locations: classpath:db/migration,classpath:db/prod
    # prod 에서는 baseline 자동 생성 비활성 — schema 가 비정상이면 부팅
    # 실패가 정답 (의도된 fail-fast). 정상 prod schema 라면 V1+ 가 이미
    # 적용돼 있어야 한다.
    baseline-on-migrate: false
    # 이미 적용된 마이그레이션 파일의 checksum 사후 수정 차단.
    validate-on-migrate: true
    # `flyway clean` 호출 차단 — prod schema 전체 drop 사고 방지.
    clean-disabled: true
  # SMTP 설정은 환경변수로만 주입한다 — 여기에 spring.mail.host 를 빈 default 로
  # 두면 안 된다. Spring Boot 의 @ConditionalOnProperty("spring.mail.host") 가
  # 빈 문자열도 "present" 로 보고 쓸모없는 JavaMailSender 빈과 mail health
  # indicator(actuator /health 의 DOWN)를 만들기 때문. 키를 생략하면:
  #   - SPRING_MAIL_HOST 미설정 → spring.mail.host 부재 → auto-config 미동작,
  #     MailSenderConfiguration 이 LogMailSender 선택(메일 미발송, 초대는 동작).
  #   - SPRING_MAIL_HOST 설정 → relaxed binding 으로 spring.mail.host 자동 인식,
  #     JavaMailSender auto-config 동작, SmtpMailSender 선택.
  # 실제 발송 시 함께 주입: SPRING_MAIL_PORT(기본 587), SPRING_MAIL_USERNAME,
  # SPRING_MAIL_PASSWORD, SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH,
  # SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE.

server:
  port: ${SERVER_PORT:8081}
  # TLS 종단을 앱에서 직접 처리할 경우 환경변수로 주입(미설정 시 SSL 비활성 — 보통 앞단 LB/리버스프록시가 종단).
  ssl:
    enabled:            ${SERVER_SSL_ENABLED:false}
    key-store:          ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type:     ${SERVER_SSL_KEY_STORE_TYPE:}
    key-alias:          ${SERVER_SSL_KEY_ALIAS:}

passkey:
  key-envelope:
    master-key: ${PASSKEY_KEY_ENVELOPE_MASTER_KEY:}

admin:
  invite:
    # 초대 수락 페이지 base URL. 메일 본문의 /accept-invite?token=... 앞에 붙는다.
    # InvitationService 의 @Value("${admin.invite.base-url:...}") 가 읽는다.
    base-url: ${ADMIN_INVITE_BASE_URL:http://localhost:5173}

logging:
  level:
    root: WARN
    com.crosscert.passkey: INFO
