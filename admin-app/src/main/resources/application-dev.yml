# dev profile — 로컬 개발자 환경
#
# 활성화: SPRING_PROFILES_ACTIVE=dev
#
# 포함: localhost Oracle/Redis + APP_ADMIN_USER credential + dev key-envelope
#       master + DEBUG 로깅 + db/seed-common(alice) + db/dev 시드(dev-passkey 테넌트)
#
# 기존 local / local-shared 가 흡수됨 — 더 이상 spring.config.import chain 사용 안 함.

spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1
    driver-class-name: oracle.jdbc.OracleDriver
    username: APP_ADMIN_USER
    password: admin_pw
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    locations: classpath:db/migration,classpath:db/seed-common,classpath:db/dev

passkey:
  key-envelope:
    # NON-SECRET, dev only — 공개 상수이지만 '0키' 신호를 제거해 실수로
    # prod 에서 약한 키가 쓰이는 것을 식별하기 쉽게 한다. prod 는 환경변수로 주입.
    # Production sets PASSKEY_KEY_ENVELOPE_MASTER_KEY environment variable.
    master-key: "jDKp21WXeDAwinZI91Hf+8L2zv4xlIQI15YPLhttyYM="
  vpd:
    # OFF — dev 는 SE2(VPD/FGAC 없음) 운영 환경을 모사한다. 테넌트 격리는 DB 커널이
    # 아니라 앱 레벨 Hibernate @Filter(TenantFilterAspect)가 담당한다. (passkey-app dev 와 일치)
    enabled: false

logging:
  level:
    com.crosscert.passkey: DEBUG
    org.hibernate.SQL: DEBUG
