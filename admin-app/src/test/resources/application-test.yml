spring:
  config:
    import: classpath:application-common.yml
  application.name: admin-app-it
  flyway:
    enabled: true
    # db/testfix carries test-only fixups applied AFTER the real migrations
    # (e.g. V9000 disables the V32 alice MFA seed so the many role/tenant ITs
    # that log in as alice are not gated by MfaPendingFilter). This location
    # exists only under src/test/resources, so it never ships to prod.
    locations: classpath:db/migration,classpath:db/testfix
    schemas: APP_OWNER
    default-schema: APP_OWNER
    baseline-on-migrate: true
    baseline-version: 0
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  session:
    store-type: redis
    timeout: PT30M
    redis:
      namespace: spring:session
  security:
    user:
      password: "____disabled____never-used-loaded-from-db-instead____"

passkey:
  key-envelope:
    # Test profile master key (32 zero bytes b64). Matches local-shared
    # default; production uses PASSKEY_KEY_ENVELOPE_MASTER_KEY.
    master-key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  # Disable @Scheduled auto-fire during short ITs. AdminFlowIT and any
  # test that boots the full admin context should not have MdsSyncJob
  # or KeyExpirationJob racing against the test's own state setup.
  # Tests that need scheduler behavior invoke MdsSchedulerService.runOnce()
  # or KeyExpirationJob.runOnce() directly (see MdsSchedulerIT, KeyRotationIT).
  mds:
    initial-delay: PT99H
    fixed-delay: PT99H
  key-rotation:
    grace: PT30M
    expiration-job:
      initial-delay: PT99H
      fixed-delay: PT99H
