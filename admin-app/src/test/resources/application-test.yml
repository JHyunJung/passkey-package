spring:
  config:
    import: classpath:application-common.yml
  application.name: admin-app-it
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: APP_OWNER
    default-schema: APP_OWNER
    baseline-on-migrate: true
    baseline-version: 0
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  session:
    store-type: redis
    timeout: PT30M
    redis:
      namespace: spring:session
  security:
    user:
      password: "____disabled____never-used-loaded-from-db-instead____"

passkey:
  key-envelope:
    # Test profile master key (32 zero bytes b64). Matches local-shared
    # default; production uses PASSKEY_KEY_ENVELOPE_MASTER_KEY.
    master-key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
