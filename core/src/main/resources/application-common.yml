spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: true
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.OracleDialect
      hibernate.jdbc.time_zone: Asia/Seoul
      # The app connects as APP_RUNTIME_USER (passkey) or APP_ADMIN_USER
      # (admin). All entity tables live in APP_OWNER schema, so Hibernate
      # must validate and issue DML against APP_OWNER, not the login
      # user's default schema. This mirrors Flyway's default-schema
      # setting (admin-app application.yml).
      hibernate.default_schema: APP_OWNER
      # Phase QW-3: JDBC 배치 + 배치 페치 사이징.
      # batch_size: 같은 flush 에 쌓인 동종 INSERT/UPDATE 를 30개 단위로 한 번에
      #   JDBC 전송 — 라운드트립만 줄고 DML 결과는 불변.
      # default_batch_fetch_size: LAZY 연관(예: Tenant.allowedOrigins/acceptedFormats)
      #   접근 시 N개 부모를 IN(...) 16개 묶음으로 페치 — 결과 동일, 쿼리 횟수만 감소.
      # order_inserts/order_updates 는 의도적으로 제외: flush DML 순서를 전역
      #   재배열하면 TenantAdminService.replaceAllowedOrigins/replaceAcceptedFormats
      #   가 의존하는 "DELETE 먼저 flush 후 INSERT"(Oracle unique 제약 회피, em.flush()
      #   로 명시 제어 중인 경로) 등 미감사 write 경로의 순서 제약을 깰 위험 → risk=low
      #   별도 판단 항목으로 유보.
      hibernate.jdbc.batch_size: 30
      hibernate.default_batch_fetch_size: 16
    hibernate.ddl-auto: validate
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: passkey-pool
      connection-init-sql: "ALTER SESSION SET TIME_ZONE='Asia/Seoul'"
  data:
    redis:
      lettuce:
        pool:
          enabled: true
          max-active: 8

management:
  endpoint.health.show-details: always
  endpoint.health.probes.enabled: true
  endpoints.web.exposure.include: health,info,prometheus
  health:
    group:
      readiness:
        include: readinessState,db,redis
      liveness:
        include: livenessState

logging:
  level:
    root: INFO
    com.crosscert.passkey: INFO
    com.crosscert.passkey.sdk: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.connections: WARN
    com.zaxxer.hikari: WARN
    org.apache.tomcat: WARN
    io.lettuce: WARN

passkey:
  deployment:
    mode: saas
  # VPD(Oracle Virtual Private Database, DBMS_RLS) 토글.
  # true  → Enterprise Edition / XE: DB 커널이 tenant 술어를 강제(이중 방어).
  # false → Standard Edition 2(VPD 미지원): 앱 레벨 Hibernate @Filter 가 격리.
  # 기본 false. VPD 를 지원하는 DB(EE/XE)에 배포할 때만 환경별 yml 에서 true 로 켠다.
  vpd:
    enabled: false
  license:
    path: /etc/passkey/license.jwt
    cache-path: /var/lib/passkey/license-cache.jwt
    issuer: license.crosscert.com
    audience: passkey-onprem
    heartbeat-url: https://license.crosscert.com/v1/license
    heartbeat-interval: PT1H
  mail:
    # 발신 주소. MailSenderConfiguration 의 SmtpMailSender 가 사용.
    # SMTP 활성화(spring.mail.host 설정) 시 의미 있음.
    from: ${PASSKEY_MAIL_FROM:no-reply@passkey.local}
