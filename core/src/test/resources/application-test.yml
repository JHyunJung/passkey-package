# Shared :core integration-test config (AppLevelIsolationIT and friends).
#
# The Testcontainers Oracle container is started by @Testcontainers /
# @Container in each IT, and a @DynamicPropertySource registers the JDBC
# URL/username/password at runtime — those keys are intentionally omitted
# here. Everything else (Flyway, JPA, driver) is fixed.
#
# Spring connects as APP_ADMIN_USER, the runtime user, which is the correct
# identity for Flyway migrations and lets ITs seed/observe credential rows
# via raw JDBC. Tenant isolation is enforced by the app-level Hibernate
# @Filter (TenantFilterAspect), not the DB user — Oracle VPD was removed.
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: APP_OWNER
    default-schema: APP_OWNER
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.OracleDialect
      hibernate.jdbc.time_zone: Asia/Seoul
      hibernate.default_schema: APP_OWNER
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      pool-name: vpd-it-pool
      connection-init-sql: "ALTER SESSION SET TIME_ZONE='Asia/Seoul'"
  # Disable Redis auto-config in the IT — no Redis container is needed
  # to prove tenant isolation, and forcing one would slow the suite down
  # by another 30+ seconds for zero coverage benefit.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

management:
  endpoints.web.exposure.include: health
