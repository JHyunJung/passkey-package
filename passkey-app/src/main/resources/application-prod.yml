# prod profile — 프로덕션 환경 (SaaS 또는 on-prem)
#
# 활성화: SPRING_PROFILES_ACTIVE=prod
#         deployment.mode 와는 독립 — onprem 배포라면
#         + PASSKEY_DEPLOYMENT_MODE=onprem 추가
#
# 모든 시크릿과 환경 특화 값은 환경변수로 주입.

spring:
  datasource:
    url:               ${SPRING_DATASOURCE_URL:}
    driver-class-name: oracle.jdbc.OracleDriver
    username:          ${SPRING_DATASOURCE_USERNAME:}
    password:          ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  # TLS 종단을 앱에서 직접 처리할 경우 환경변수로 주입(미설정 시 SSL 비활성 — 보통 앞단 LB/리버스프록시가 종단).
  ssl:
    enabled:            ${SERVER_SSL_ENABLED:false}
    key-store:          ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type:     ${SERVER_SSL_KEY_STORE_TYPE:}
    key-alias:          ${SERVER_SSL_KEY_ALIAS:}

passkey:
  # VPD 토글. ⚠️ 중요: 대상 Oracle 에 VPD 정책이 이미 부착돼 있으면(기존 EE/XE 운영 DB)
  # 반드시 true 로 설정해야 한다. 정책이 active 인데 false 면 set_tenant 가 호출되지 않아
  # VPD predicate 가 '1=0' 으로 평가되어 모든 쿼리가 0행을 반환한다(앱 장애).
  # SE2(VPD 미지원, 정책 미부착) 배포에서만 false. 환경변수 PASSKEY_VPD_ENABLED 로 제어.
  vpd:
    enabled: ${PASSKEY_VPD_ENABLED:false}
  key-envelope:
    master-key: ${PASSKEY_KEY_ENVELOPE_MASTER_KEY:}
  id-token:
    issuer-base: ${PASSKEY_ID_TOKEN_ISSUER_BASE:}

logging:
  level:
    root: WARN
    com.crosscert.passkey: INFO
