# dev profile — 로컬 개발자 환경
#
# 활성화: SPRING_PROFILES_ACTIVE=dev ./gradlew :passkey-app:bootRun \
#         --args="--passkey.id-token.issuer-base=http://localhost:8080"
#
# 포함: localhost Oracle/Redis + APP_RUNTIME_USER credential + dev key-envelope
#       master + DEBUG 로깅
#
# 기존 local / local-shared 가 흡수됨 — 더 이상 spring.config.import chain 사용 안 함.

server:
  # TLS 종단을 앱에서 직접 처리할 경우 환경변수로 주입(미설정 시 SSL 비활성).
  ssl:
    enabled:            ${SERVER_SSL_ENABLED:false}
    key-store:          ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type:     ${SERVER_SSL_KEY_STORE_TYPE:}
    key-alias:          ${SERVER_SSL_KEY_ALIAS:}

spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1
    driver-class-name: oracle.jdbc.OracleDriver
    username: APP_RUNTIME_USER
    password: runtime_pw
  data:
    redis:
      host: localhost
      port: 6379

passkey:
  key-envelope:
    # NON-SECRET, dev only — admin-app 과 동일 값이어야 한다(같은 DB 의 signing key 를
    # 양쪽이 공유하므로 master-key 불일치 시 복호화 실패). prod 는 환경변수로 주입.
    master-key: "jDKp21WXeDAwinZI91Hf+8L2zv4xlIQI15YPLhttyYM="

logging:
  level:
    com.crosscert.passkey: DEBUG
    org.hibernate.SQL: DEBUG
