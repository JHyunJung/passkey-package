# 로컬 데모 프로필 — passkey-app(8080)/admin-app(8081)/rp-app(9090) + Oracle XE/Redis 를
# 같은 머신에 띄우고 브라우저로 패스키 등록/로그인을 직접 테스트할 때 쓴다.
#
# 아래 값은 passkey-app 에 등록된 데모 테넌트와 일치한다:
#   - tenantId : 00000000-0000-0000-0000-00000000c0de
#   - rpId     : localhost
#   - API key  : pk_devlocaldev_local_secret_known_plaintext_for_test_only
#
# tenant-id 가 비면 인증 시 iss/aud 검증에 실패한다. 또한 rp-app 은 ID Token 의 iss 를
# "<issuer-base>/<tenantId>" 로 검증하므로, passkey-app 을
# -Dpasskey.id-token.issuer-base=http://localhost:8080 으로 띄워 아래 issuer-base 와 맞춘다.
#
# 기동 예:
#   ./gradlew :rp-app:bootRun --args="--spring.profiles.active=local"
passkey:
  base-url:    http://localhost:8080
  # X-API-Key 값 = 키 prefix + 평문 secret 을 이어붙인 형태(데모 키).
  api-key:     pk_devlocaldev_local_secret_known_plaintext_for_test_only
  # passkey-app 은 iss = "<issuer-base>/<tenantId>", aud = "<tenantId>" 로 ID Token 을 발급하고,
  # rp-app 은 이 tenant-id 로 iss 의 tenantId 부분과 aud 를 검증한다.
  tenant-id:   00000000-0000-0000-0000-00000000c0de
  issuer-base: http://localhost:8080
