# 로컬 데모 프로필 — passkey-app(8080)/admin-app(8081)/rp-app(9090) + Oracle XE/Redis 를
# 같은 머신에 띄우고 브라우저로 패스키 등록/로그인을 직접 테스트할 때 쓴다.
#
# 값은 core/src/main/resources/db/local/R__seed_local_tenant.sql 의 demo-rp 테넌트와 일치한다:
#   - tenantId : 00000000-0000-0000-0000-00000000c0de (RAW16 hex: 0000000000000000000000000000C0DE)
#   - rpId     : localhost
#   - API key  : pk_devlocal + plaintext dev_local_secret_known_plaintext_for_test_only
#
# 이 프로필이 없으면 PASSKEY_TENANT_ID 가 빈 문자열로 남아 login/complete 시
# iss/aud mismatch(P004)가 난다. passkey-app 은 -Dpasskey.id-token.issuer-base=http://localhost:8080
# 으로 띄워 iss prefix 를 아래 issuer-base 와 맞춘다.
#
# 기동 예:
#   ./gradlew :rp-app:bootRun --args="--spring.profiles.active=local"
passkey:
  base-url:    http://localhost:8080
  # demo-rp API key: prefix(pk_devlocal) + plaintext secret 를 이어붙인 X-API-Key 값.
  api-key:     pk_devlocaldev_local_secret_known_plaintext_for_test_only
  # IdTokenIssuer 가 iss = "<issuer-base>/<tenantId>", aud = "<tenantId>" 로 발급한다.
  # rp-app 은 이 tenant-id 로 iss 의 tenantId 부분과 aud 를 검증한다.
  tenant-id:   00000000-0000-0000-0000-00000000c0de
  issuer-base: http://localhost:8080
