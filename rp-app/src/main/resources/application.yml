server:
  port: 9090

rp-app:
  origin: ${RP_APP_ORIGIN:http://localhost:9090}
  # 재기동 후에도 확정 등록된 user↔handle↔credential 매핑을 유지하기 위한 JSON 파일.
  # 단일 인스턴스 데모용. 환경변수 RP_APP_USER_STORE_FILE 로 오버라이드 가능.
  user-store:
    file: ${RP_APP_USER_STORE_FILE:./data/rp-app-users.json}
  # 네이티브 앱 패스키용 Well-Known URI 값. 미설정 시 첨부 샘플 앱(com.crosscert.sample.passkey)
  # 으로 바로 동작한다. 고객사는 아래 환경변수만 자기 앱 값으로 교체하면 코드 수정 없이 재사용.
  well-known:
    android:
      - package-name: ${WK_ANDROID_PACKAGE:com.crosscert.sample.passkey}
        sha256-fingerprints:
          - ${WK_ANDROID_SHA256:63:0C:F8:85:C6:9A:80:A0:87:B0:A2:72:83:61:00:29:F8:36:65:FF:EF:8E:FE:71:71:74:13:ED:34:9D:7C:54}
    ios:
      app-ids:
        - ${WK_IOS_APPID:LTPC88ZFE8.com.crosscert.sample.passkey}

passkey:
  base-url:    ${PASSKEY_BASE_URL:http://localhost:8080}
  api-key:     ${PASSKEY_API_KEY:}
  # 재기동 없는 키 교체용. 설정 시 이 파일을 핫리로드(api-key env 보다 우선).
  # 미설정이면 위 api-key 를 그대로 쓴다(기존 동작 보존). 파일 내용은 키 평문 한 줄.
  api-key-file:   ${PASSKEY_API_KEY_FILE:}
  # api-key-file mtime 폴링 주기. 기본 10s.
  api-key-reload: ${PASSKEY_API_KEY_RELOAD:10s}
  tenant-id:   ${PASSKEY_TENANT_ID:}
  # passkey-app 의 IdTokenIssuer 가 발급하는 iss prefix. passkey-app 의
  # passkey.id-token.issuer-base (기본 https://passkey.crosscert.com) 와 일치해야 한다.
  # 로컬 데모에서는 passkey-app 측을 application-local.yml 로 같은 값으로 override 하거나
  # bootRun 시 -Dpasskey.id-token.issuer-base=http://localhost:8080 으로 띄운다.
  issuer-base: ${PASSKEY_ISSUER_BASE:http://localhost:8080}
  connect-timeout: 3s
  read-timeout: 10s
  jwks-cache-ttl: 5m

rp:
  relay:
    # 등록 relay 토큰 HMAC 서명 키. ⚠️ 운영은 환경변수로 강한 키 주입(미설정 시 데모 키 폴백).
    secret: ${RP_RELAY_SECRET:}
    ttl: 5m
  cors:
    # cross-origin 웹 SPA 의 정확한 origin 목록. 비면 CORS 비활성(같은-origin 데모만).
    # ⚠️ 와일드카드/reflected 금지. passkey-app tenant allowed-origins 와 일치시킬 것.
    allowed-origins: ${RP_CORS_ALLOWED_ORIGINS:}

spring:
  session:
    store-type: none
  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    com.crosscert.passkey: INFO
    com.crosscert.passkey.sdk: INFO
    com.crosscert.passkey.rpapp: INFO
    org.springframework.web: WARN
